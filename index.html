<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshit Tiwari | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: {
                            yellow: '#EBFF00',
                            pink: '#FF00FF',
                            cyan: '#00FFFF',
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
      .font-display { font-family: 'Archivo Black', sans-serif; }
      .font-mono { font-family: 'Space Mono', monospace; }
      html { scroll-behavior: smooth; }

      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #ffffff; border-left: 3px solid #000000; }
      .dark ::-webkit-scrollbar-track { background: #000000; border-left: 3px solid #ffffff; }
      ::-webkit-scrollbar-thumb { background: #EBFF00; border: 3px solid #000000; }
      .dark ::-webkit-scrollbar-thumb { background: #EBFF00; border: 3px solid #ffffff; }
      ::-webkit-scrollbar-thumb:hover { background: #FF00FF; }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee { animation: marquee 20s linear infinite; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn { animation: fadeIn 0.25s ease forwards; }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-modalIn { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      .bg-grid-pattern {
        background-image:
          linear-gradient(to right, #e5e7eb 1px, transparent 1px),
          linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .dark .bg-grid-pattern {
        background-image:
          linear-gradient(to right, #333333 1px, transparent 1px),
          linear-gradient(to bottom, #333333 1px, transparent 1px);
      }

      .modal-scroll::-webkit-scrollbar { width: 8px; }
      .modal-scroll::-webkit-scrollbar-track { background: #fff; border-left: 2px solid #000; }
      .dark .modal-scroll::-webkit-scrollbar-track { background: #111; border-left: 2px solid #fff; }
      .modal-scroll::-webkit-scrollbar-thumb { background: #FF00FF; border: 2px solid #000; }
      .dark .modal-scroll::-webkit-scrollbar-thumb { background: #EBFF00; border: 2px solid #fff; }

      .repo-card:hover { transform: translate(-3px, -3px); }
      .repo-card { transition: transform 0.15s ease; }

      @keyframes scanline {
        0% { top: -2%; }
        100% { top: 102%; }
      }
      .animate-scanline { animation: scanline 3s linear infinite; }

      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-3px, 2px); }
        40% { transform: translate(3px, -2px); }
        60% { transform: translate(-2px, 3px); }
        80% { transform: translate(2px, -1px); }
      }
      .animate-glitch { animation: glitch 0.4s ease forwards; }

      @keyframes kernelBoot {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-kernelBoot { animation: kernelBoot 0.08s ease forwards; }

      .terminal-scroll::-webkit-scrollbar { width: 6px; }
      .terminal-scroll::-webkit-scrollbar-track { background: #000; }
      .terminal-scroll::-webkit-scrollbar-thumb { background: #00FF41; }
    </style>
</head>
<body class="bg-white text-black dark:bg-[#0a0a0a] dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---
        const Icon = ({ path, size = 24, className = "", strokeWidth = 2 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Github = (p) => <Icon {...p} path={<><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></>} />;
        const Linkedin = (p) => <Icon {...p} path={<><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></>} />;
        const Mail = (p) => <Icon {...p} path={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>} />;
        const ExternalLink = (p) => <Icon {...p} path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></>} />;
        const Terminal = (p) => <Icon {...p} path={<><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></>} />;
        const Code = (p) => <Icon {...p} path={<><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>} />;
        const Award = (p) => <Icon {...p} path={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />;
        const ChevronDown = (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9"/>} />;
        const Moon = (p) => <Icon {...p} path={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>} />;
        const Sun = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>} />;
        const Star = (p) => <Icon {...p} path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} />;
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const GitFork = (p) => <Icon {...p} path={<><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M6 9v2c0 .6.4 1 1 1h8a1 1 0 0 0 1-1V9"/><line x1="12" y1="12" x2="12" y2="15"/></>} />;
        const Layers = (p) => <Icon {...p} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;

        const langColors = {
            "JavaScript": "#f1e05a", "TypeScript": "#2b7489", "Python": "#3572A5",
            "Dart": "#00B4AB", "C": "#555555", "C++": "#f34b7d", "Java": "#b07219",
            "HTML": "#e34c26", "CSS": "#563d7c", "Shell": "#89e051", "Rust": "#dea584",
            "Go": "#00ADD8", "Kotlin": "#F18E33", "Swift": "#ffac45",
            "Jupyter Notebook": "#DA5B0B", "Ruby": "#701516", "Solidity": "#AA6746",
        };

        // РћђРћђРћђ KERNEL MODE OVERLAY РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
        const KernelModeOverlay = ({ onClose }) => {
            const lines = [
                "> KERNEL MODE ACTIVATED",
                "> USER: harshit@harshit-dev",
                "> UID: 0 (ROOT)",
                "> KERNEL: Linux 6.12.0-harshit-custom #7 SMP PREEMPT_RT",
                "> UPTIME: 7 years, building since age 14",
                "> CPU: Snapdragon SM6225 (patched by this guy)",
                "> MODULES: pytorch llama3 yolov8 flutter supabase",
                "> CURRENT_TASK: [WaterPlane AI] environmental_monitoring.py",
                "> LAST_COMMIT: \"fine-tune llama3 on synthetic forensics dataset\"",
                "> STATUS: all systems nominal РюЊ",
                ">",
                "> press [ESC] or click EXIT to return to userspace",
            ];
            const [visibleLines, setVisibleLines] = useState([]);
            const [booting, setBooting] = useState(true);

            useEffect(() => {
                let i = 0;
                const t = setInterval(() => {
                    if (i < lines.length) {
                        setVisibleLines(prev => [...prev, lines[i]]);
                        i++;
                    } else {
                        setBooting(false);
                        clearInterval(t);
                    }
                }, 80);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                const h = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', h);
                return () => window.removeEventListener('keydown', h);
            }, []);

            return (
                <div className="fixed inset-0 z-[200] bg-black overflow-hidden" style={{fontFamily: 'Space Mono, monospace'}}>
                    <div className="animate-scanline absolute left-0 w-full h-[2px] pointer-events-none" style={{background: 'rgba(0,255,65,0.4)'}}></div>
                    <div className="h-full flex flex-col justify-between p-6 md:p-12 overflow-auto terminal-scroll">
                        <div>
                            <div className="text-[#00FF41] text-xs md:text-sm mb-6 opacity-60">
                                BIOS v2.4 | BBD UNIVERSITY Рђћ HARSHIT TIWARI SYSTEMS
                            </div>
                            {visibleLines.map((line, i) => (
                                <div key={i} className="animate-kernelBoot text-[#00FF41] text-sm md:text-base mb-1 leading-relaxed">
                                    {line}
                                </div>
                            ))}
                            {booting && <span className="text-[#00FF41] animate-pulse">_</span>}
                        </div>
                        <div className="mt-8">
                            <button
                                onClick={onClose}
                                className="border-2 border-[#00FF41] text-[#00FF41] font-bold px-6 py-3 text-sm uppercase tracking-widest hover:bg-[#00FF41] hover:text-black transition-colors"
                            >
                                [ EXIT KERNEL MODE ]
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // РћђРћђРћђ SECRET TERMINAL РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
        const SecretTerminal = ({ onClose }) => {
            const [history, setHistory] = useState([
                { type: 'system', text: 'harshit@portfolio terminal v1.0 Рђћ type "help" for commands' }
            ]);
            const [input, setInput] = useState('');
            const inputRef = useRef(null);
            const bottomRef = useRef(null);

            const allSkills = {
                "Languages": ["Python", "TypeScript", "C++", "JavaScript", "Shell"],
                "AI/ML": ["PyTorch", "Llama-3", "BERT", "OpenCV", "LSTM", "ARIMA", "Agentic Pipelines"],
                "Frontend": ["React.js", "Next.js", "Flutter", "Tailwind CSS", "Riverpod"],
                "Backend": ["FastAPI", "Node.js", "Supabase", "PostgreSQL", "Firebase", "MongoDB"],
                "Systems": ["Linux Kernel", "Docker", "Git", "FFmpeg", "Lightning AI", "Claude Code"]
            };

            const commands = {
                help: () => "Available: whoami, ls skills/, cat manifesto.txt, git log, uname -a, clear, sudo make coffee",
                whoami: () => "harshit.tiwari Рђћ full-stack dev, kernel hacker, ai engineer. building waterplane.",
                "ls skills/": () => Object.entries(allSkills).map(([k,v]) => `${k}/\n  ${v.join('  ')}`).join('\n'),
                "uname -a": () => "Linux harshit-dev 6.12.0-harshit-custom #7 SMP x86_64 GNU/Linux",
                "git log --oneline -5": () =>
                    "a3f91c2 fine-tune llama3 on synthetic forensics dataset\n" +
                    "b82de10 add yolov8 uas tracking pipeline with numpy telemetry\n" +
                    "c17aa43 deploy vaayu-darshak cnn+lstm+arima ensemble to prod\n" +
                    "d90ff81 patch SM6225 kernel: fix thermal throttle on sustained load\n" +
                    "e44bc09 ship automotive crm with 7-tier rbac + supabase rls",
                "cat manifesto.txt": () => "Ship fast. Go deep. Kernel or cloud Рђћ it doesn't matter. Build things that work.",
                "sudo make coffee": () => "Error: coffee: command not found. Try: sudo apt install coffee",
                clear: () => null,
            };

            useEffect(() => {
                inputRef.current?.focus();
            }, []);

            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [history]);

            const handleSubmit = (e) => {
                e.preventDefault();
                const cmd = input.trim().toLowerCase();
                if (!cmd) return;

                if (cmd === 'clear') {
                    setHistory([{ type: 'system', text: 'cleared.' }]);
                    setInput('');
                    return;
                }

                const output = commands[cmd] ? commands[cmd]() : `command not found: ${cmd}. try 'help'`;
                setHistory(prev => [
                    ...prev,
                    { type: 'input', text: `harshit@portfolio:~$ ${input}` },
                    { type: 'output', text: output }
                ]);
                setInput('');
            };

            return (
                <div className="fixed bottom-4 right-4 z-[150] w-[min(500px,calc(100vw-2rem))]"
                     style={{fontFamily: 'Space Mono, monospace'}}>
                    <div className="border-[3px] border-[#00FF41] bg-[#0a0a0a] shadow-[6px_6px_0px_0px_#00FF41]">
                        <div className="flex items-center justify-between bg-[#00FF41] px-3 py-2">
                            <span className="text-black text-xs font-bold uppercase tracking-wider">harshit@portfolio:~$</span>
                            <button onClick={onClose} className="text-black hover:text-[#FF00FF] transition-colors">
                                <X size={16} />
                            </button>
                        </div>
                        <div className="h-[260px] overflow-y-auto p-3 terminal-scroll">
                            {history.map((item, i) => (
                                <div key={i} className={`text-xs mb-1 leading-relaxed whitespace-pre-wrap ${item.type === 'input' ? 'text-[#EBFF00]' : item.type === 'system' ? 'text-[#00FF41] opacity-60' : 'text-[#00FF41]'}`}>
                                    {item.text}
                                </div>
                            ))}
                            <div ref={bottomRef} />
                        </div>
                        <form onSubmit={handleSubmit} className="flex border-t border-[#00FF41]">
                            <span className="text-[#00FF41] text-xs px-2 py-2 opacity-60 flex-shrink-0">$</span>
                            <input
                                ref={inputRef}
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                className="flex-1 bg-transparent text-[#00FF41] text-xs py-2 pr-2 focus:outline-none"
                                autoComplete="off"
                                spellCheck={false}
                            />
                        </form>
                    </div>
                </div>
            );
        };

        // РћђРћђРћђ EXPLORE MORE MODAL РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
        const ExploreModal = ({ onClose, isDark }) => {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filter, setFilter] = useState('');
            const [langFilter, setLangFilter] = useState('ALL');

            useEffect(() => {
                const fetchRepos = async () => {
                    try {
                        const res = await fetch('https://api.github.com/users/iamharshit188/repos?sort=updated&per_page=100');
                        if (!res.ok) throw new Error('GitHub API error');
                        const data = await res.json();
                        const own = data.filter(r => !r.fork);
                        own.sort((a, b) => b.stargazers_count - a.stargazers_count);
                        setRepos(own);
                    } catch(e) {
                        setError('Could not load repos. Check your connection.');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchRepos();
                const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const languages = ['ALL', ...Array.from(new Set(repos.map(r => r.language).filter(Boolean)))];
            const filtered = repos.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(filter.toLowerCase()) ||
                    (r.description || '').toLowerCase().includes(filter.toLowerCase());
                const matchesLang = langFilter === 'ALL' || r.language === langFilter;
                return matchesSearch && matchesLang;
            });

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4"
                    style={{ background: 'rgba(0,0,0,0.75)' }}
                    onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="animate-modalIn w-full max-w-5xl max-h-[90vh] bg-white dark:bg-[#0a0a0a] border-[3px] border-black dark:border-white shadow-[10px_10px_0px_0px_#FF00FF] flex flex-col">
                        <div className="flex items-center justify-between border-b-[3px] border-black dark:border-white p-4 md:p-6 bg-[#EBFF00] flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <Layers size={28} className="text-black" />
                                <div>
                                    <h2 className="font-display text-2xl md:text-3xl uppercase text-black leading-none">All Projects</h2>
                                    <p className="font-mono text-xs text-black mt-0.5">github.com/iamharshit188 Рђћ own repos only</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="border-[3px] border-black p-1.5 bg-white hover:bg-[#FF00FF] hover:text-white transition-colors shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[2px] active:translate-y-[2px]">
                                <X size={22} className="text-black" />
                            </button>
                        </div>
                        {!loading && !error && (
                            <div className="flex flex-col sm:flex-row gap-3 p-4 border-b-[3px] border-black dark:border-white bg-gray-50 dark:bg-[#111] flex-shrink-0">
                                <input type="text" placeholder="SEARCH REPOS..." value={filter} onChange={e => setFilter(e.target.value)}
                                    className="font-mono font-bold text-sm border-[2px] border-black dark:border-white px-3 py-2 bg-white dark:bg-[#0a0a0a] dark:text-white focus:outline-none focus:border-[#FF00FF] flex-1 uppercase placeholder:text-gray-400" />
                                <div className="flex gap-2 overflow-x-auto pb-1 sm:pb-0">
                                    {languages.slice(0, 8).map(lang => (
                                        <button key={lang} onClick={() => setLangFilter(lang)}
                                            className={`font-mono text-xs font-bold border-[2px] px-3 py-1 whitespace-nowrap transition-colors ${langFilter === lang ? 'bg-black dark:bg-white text-white dark:text-black border-black dark:border-white' : 'border-black dark:border-white hover:bg-[#EBFF00] hover:text-black hover:border-black'}`}>
                                            {lang}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto modal-scroll p-4 md:p-6">
                            {loading && (
                                <div className="flex flex-col items-center justify-center h-48 gap-4">
                                    <div className="font-display text-2xl uppercase animate-pulse text-[#FF00FF]">LOADING...</div>
                                    <div className="font-mono text-sm dark:text-gray-400">Fetching from GitHub API</div>
                                </div>
                            )}
                            {error && (
                                <div className="border-[3px] border-black dark:border-white p-6 bg-[#FF00FF] text-white">
                                    <p className="font-display text-xl uppercase">{error}</p>
                                </div>
                            )}
                            {!loading && !error && (
                                <>
                                    <p className="font-mono text-xs mb-4 text-gray-500 dark:text-gray-400 uppercase">
                                        {filtered.length} repo{filtered.length !== 1 ? 's' : ''} found
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
