        const MagBtn = ({ children, onClick, className = '', href, target, rel, style: extStyle = {} }) => {
            const ref = useRef(null);
            const onMove = (e) => {
                const el = ref.current; if (!el) return;
                const r = el.getBoundingClientRect();
                const x = (e.clientX - r.left - r.width / 2) * 0.3;
                const y = (e.clientY - r.top - r.height / 2) * 0.3;
                el.style.transform = `translate(${x}px, ${y}px)`;
            };
            const onLeave = () => { if (ref.current) ref.current.style.transform = 'translate(0,0)'; };
            const style = { transition: 'transform 0.45s cubic-bezier(0.16,1,0.3,1)', ...extStyle };
            if (href) return (
                <a ref={ref} href={href} target={target} rel={rel} className={className}
                   style={style} onMouseMove={onMove} onMouseLeave={onLeave}>{children}</a>
            );
            return (

        };

        const AnimCounter = ({ target, suffix = '', prefix = '' }) => {
            const [val, setVal] = useState(0);
            const ref = useRef(null);
            const started = useRef(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !started.current) {
                        started.current = true;
                        const start = performance.now();
                        const dur = 1800;
                        const tick = (now) => {
                            const prog = Math.min((now - start) / dur, 1);
                            const ease = 1 - Math.pow(1 - prog, 4);
                            setVal(Math.floor(ease * target));
                            if (prog < 1) requestAnimationFrame(tick);
                        };
                        requestAnimationFrame(tick);
                        obs.disconnect();
                    }
                }, { threshold: 0.5 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, [target]);
            return <span ref={ref}>{prefix}{val}{suffix}</span>;
        };
