<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshit Tiwari | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: {
                            yellow: '#EBFF00',
                            pink: '#FF00FF',
                            cyan: '#00FFFF',
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
      .font-display { font-family: 'Archivo Black', sans-serif; }
      .font-mono { font-family: 'Space Mono', monospace; }
      html { scroll-behavior: smooth; }

      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #ffffff; border-left: 3px solid #000000; }
      .dark ::-webkit-scrollbar-track { background: #000000; border-left: 3px solid #ffffff; }
      ::-webkit-scrollbar-thumb { background: #EBFF00; border: 3px solid #000000; }
      .dark ::-webkit-scrollbar-thumb { background: #EBFF00; border: 3px solid #ffffff; }
      ::-webkit-scrollbar-thumb:hover { background: #FF00FF; }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee { animation: marquee 20s linear infinite; }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn { animation: fadeIn 0.25s ease forwards; }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-modalIn { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      .bg-grid-pattern {
        background-image: 
          linear-gradient(to right, #e5e7eb 1px, transparent 1px),
          linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .dark .bg-grid-pattern {
        background-image: 
          linear-gradient(to right, #333333 1px, transparent 1px),
          linear-gradient(to bottom, #333333 1px, transparent 1px);
      }

      /* Modal scrollbar */
      .modal-scroll::-webkit-scrollbar { width: 8px; }
      .modal-scroll::-webkit-scrollbar-track { background: #fff; border-left: 2px solid #000; }
      .dark .modal-scroll::-webkit-scrollbar-track { background: #111; border-left: 2px solid #fff; }
      .modal-scroll::-webkit-scrollbar-thumb { background: #FF00FF; border: 2px solid #000; }
      .dark .modal-scroll::-webkit-scrollbar-thumb { background: #EBFF00; border: 2px solid #fff; }

      .repo-card:hover { transform: translate(-3px, -3px); }
      .repo-card { transition: transform 0.15s ease; }
    </style>
</head>
<body class="bg-white text-black dark:bg-[#0a0a0a] dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- ICONS ---
        const Icon = ({ path, size = 24, className = "", strokeWidth = 2 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Github = (p) => <Icon {...p} path={<><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></>} />;
        const Linkedin = (p) => <Icon {...p} path={<><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></>} />;
        const Mail = (p) => <Icon {...p} path={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>} />;
        const ExternalLink = (p) => <Icon {...p} path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></>} />;
        const Terminal = (p) => <Icon {...p} path={<><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></>} />;
        const Code = (p) => <Icon {...p} path={<><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>} />;
        const Award = (p) => <Icon {...p} path={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />;
        const ChevronDown = (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9"/>} />;
        const Moon = (p) => <Icon {...p} path={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>} />;
        const Sun = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>} />;
        const Star = (p) => <Icon {...p} path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} />;
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const GitFork = (p) => <Icon {...p} path={<><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M6 9v2c0 .6.4 1 1 1h8a1 1 0 0 0 1-1V9"/><line x1="12" y1="12" x2="12" y2="15"/></>} />;
        const Layers = (p) => <Icon {...p} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;

        // LANG COLOR MAP
        const langColors = {
            "JavaScript": "#f1e05a", "TypeScript": "#2b7489", "Python": "#3572A5",
            "Dart": "#00B4AB", "C": "#555555", "C++": "#f34b7d", "Java": "#b07219",
            "HTML": "#e34c26", "CSS": "#563d7c", "Shell": "#89e051", "Rust": "#dea584",
            "Go": "#00ADD8", "Kotlin": "#F18E33", "Swift": "#ffac45",
            "Jupyter Notebook": "#DA5B0B", "Ruby": "#701516", "Solidity": "#AA6746",
        };

        // ─── EXPLORE MORE MODAL ───────────────────────────────────────────────
        const ExploreModal = ({ onClose, isDark }) => {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filter, setFilter] = useState('');
            const [langFilter, setLangFilter] = useState('ALL');

            useEffect(() => {
                const fetchRepos = async () => {
                    try {
                        const res = await fetch('https://api.github.com/users/iamharshit188/repos?sort=updated&per_page=100');
                        if (!res.ok) throw new Error('GitHub API error');
                        const data = await res.json();
                        // Only own repos, not forks
                        const own = data.filter(r => !r.fork);
                        // Sort by stars desc
                        own.sort((a, b) => b.stargazers_count - a.stargazers_count);
                        setRepos(own);
                    } catch(e) {
                        setError('Could not load repos. Check your connection.');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchRepos();

                // Close on ESC
                const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const languages = ['ALL', ...Array.from(new Set(repos.map(r => r.language).filter(Boolean)))];

            const filtered = repos.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(filter.toLowerCase()) ||
                    (r.description || '').toLowerCase().includes(filter.toLowerCase());
                const matchesLang = langFilter === 'ALL' || r.language === langFilter;
                return matchesSearch && matchesLang;
            });

            return (
                <div 
                    className="fixed inset-0 z-[100] flex items-center justify-center p-4"
                    style={{ background: 'rgba(0,0,0,0.75)' }}
                    onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
                >
                    <div className="animate-modalIn w-full max-w-5xl max-h-[90vh] bg-white dark:bg-[#0a0a0a] border-[3px] border-black dark:border-white shadow-[10px_10px_0px_0px_#FF00FF] flex flex-col">
                        
                        {/* Modal Header */}
                        <div className="flex items-center justify-between border-b-[3px] border-black dark:border-white p-4 md:p-6 bg-[#EBFF00] flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <Layers size={28} className="text-black" />
                                <div>
                                    <h2 className="font-display text-2xl md:text-3xl uppercase text-black leading-none">All Projects</h2>
                                    <p className="font-mono text-xs text-black mt-0.5">github.com/iamharshit188 — own repos only</p>
                                </div>
                            </div>
                            <button 
                                onClick={onClose}
                                className="border-[3px] border-black p-1.5 bg-white hover:bg-[#FF00FF] hover:text-white transition-colors shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[2px] active:translate-y-[2px]"
                            >
                                <X size={22} className="text-black" />
                            </button>
                        </div>

                        {/* Filters */}
                        {!loading && !error && (
                            <div className="flex flex-col sm:flex-row gap-3 p-4 border-b-[3px] border-black dark:border-white bg-gray-50 dark:bg-[#111] flex-shrink-0">
                                <input
                                    type="text"
                                    placeholder="SEARCH REPOS..."
                                    value={filter}
                                    onChange={e => setFilter(e.target.value)}
                                    className="font-mono font-bold text-sm border-[2px] border-black dark:border-white px-3 py-2 bg-white dark:bg-[#0a0a0a] dark:text-white focus:outline-none focus:border-[#FF00FF] flex-1 uppercase placeholder:text-gray-400"
                                />
                                <div className="flex gap-2 overflow-x-auto pb-1 sm:pb-0">
                                    {languages.slice(0, 8).map(lang => (
                                        <button
                                            key={lang}
                                            onClick={() => setLangFilter(lang)}
                                            className={`font-mono text-xs font-bold border-[2px] px-3 py-1 whitespace-nowrap transition-colors ${
                                                langFilter === lang 
                                                    ? 'bg-black dark:bg-white text-white dark:text-black border-black dark:border-white' 
                                                    : 'border-black dark:border-white hover:bg-[#EBFF00] hover:text-black hover:border-black'
                                            }`}
                                        >
                                            {lang}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto modal-scroll p-4 md:p-6">
                            {loading && (
                                <div className="flex flex-col items-center justify-center h-48 gap-4">
                                    <div className="font-display text-2xl uppercase animate-pulse text-[#FF00FF]">LOADING...</div>
                                    <div className="font-mono text-sm dark:text-gray-400">Fetching from GitHub API</div>
                                </div>
                            )}

                            {error && (
                                <div className="border-[3px] border-black dark:border-white p-6 bg-[#FF00FF] text-white">
                                    <p className="font-display text-xl uppercase">{error}</p>
                                </div>
                            )}

                            {!loading && !error && (
                                <>
                                    <p className="font-mono text-xs mb-4 text-gray-500 dark:text-gray-400 uppercase">
                                        {filtered.length} repo{filtered.length !== 1 ? 's' : ''} found
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {filtered.map((repo) => (
                                            <a 
                                                key={repo.id}
                                                href={repo.html_url}
                                                target="_blank"
                                                rel="noreferrer"
                                                className="repo-card block border-[2px] border-black dark:border-white p-4 bg-white dark:bg-[#111] shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)] hover:shadow-[6px_6px_0px_0px_#FF00FF] dark:hover:shadow-[6px_6px_0px_0px_#EBFF00]"
                                                style={{ textDecoration: 'none' }}
                                            >
                                                <div className="flex items-start justify-between mb-2 gap-2">
                                                    <h3 className="font-display text-base uppercase leading-tight text-black dark:text-white break-all">
                                                        {repo.name}
                                                    </h3>
                                                    <ExternalLink size={14} className="text-gray-400 flex-shrink-0 mt-0.5" />
                                                </div>

                                                {repo.description && (
                                                    <p className="font-mono text-xs text-gray-600 dark:text-gray-400 mb-3 leading-relaxed line-clamp-2">
                                                        {repo.description}
                                                    </p>
                                                )}

                                                <div className="flex items-center justify-between mt-auto pt-2 border-t border-gray-200 dark:border-gray-700">
                                                    <div className="flex items-center gap-3">
                                                        {repo.language && (
                                                            <span className="flex items-center gap-1 font-mono text-xs font-bold">
                                                                <span 
                                                                    className="w-2.5 h-2.5 rounded-full border border-black dark:border-white"
                                                                    style={{ background: langColors[repo.language] || '#888' }}
                                                                ></span>
                                                                {repo.language}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        {repo.stargazers_count > 0 && (
                                                            <span className="flex items-center gap-1 font-mono text-xs text-gray-500 dark:text-gray-400">
                                                                <Star size={11} /> {repo.stargazers_count}
                                                            </span>
                                                        )}
                                                        {repo.forks_count > 0 && (
                                                            <span className="flex items-center gap-1 font-mono text-xs text-gray-500 dark:text-gray-400">
                                                                <GitFork size={11} /> {repo.forks_count}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                            </a>
                                        ))}
                                    </div>

                                    {filtered.length === 0 && (
                                        <div className="text-center py-16">
                                            <p className="font-display text-2xl uppercase text-gray-300 dark:text-gray-700">NO REPOS FOUND</p>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="border-t-[3px] border-black dark:border-white p-3 bg-black dark:bg-white flex-shrink-0">
                            <a 
                                href="https://github.com/iamharshit188" 
                                target="_blank" 
                                rel="noreferrer"
                                className="font-mono text-xs text-[#EBFF00] dark:text-black font-bold uppercase hover:underline flex items-center gap-2"
                            >
                                <Github size={14} /> View Full Profile on GitHub
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── MAIN COMPONENT ───────────────────────────────────────────────────
        const NeoPortfolio = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isDark, setIsDark] = useState(false);
            const [showExplore, setShowExplore] = useState(false);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // Prevent body scroll when modal open
            useEffect(() => {
                document.body.style.overflow = showExplore ? 'hidden' : '';
                return () => { document.body.style.overflow = ''; };
            }, [showExplore]);

            const scrollToSection = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                setIsMenuOpen(false);
            };

            const skills = {
                languages: ["C++", "Python", "JavaScript", "Dart", "Solidity", "Shell"],
                frameworks: ["React.js", "Flutter", "Node.js", "PyTorch", "Manim", "Tailwind"],
                tools: ["Linux Kernel", "Docker", "Git", "Firebase", "MongoDB", "Figma"]
            };

            const experience = [
                {
                    company: "WaterPlane",
                    role: "Co-Founder",
                    date: "Jul 2025 – Present",
                    type: "Full-time",
                    skills: ["Start-up Leadership", "Start-up Ventures"],
                    description: "Co-founding a deep-tech startup focused on building AI-driven environmental monitoring solutions. Leading product vision, engineering roadmap, and team growth."
                },
                {
                    company: "Lucknow Super Giants",
                    role: "Management Team Member",
                    date: "Mar 2025 – Jun 2025",
                    type: "Part-time · On-site",
                    skills: ["Infrastructure Management"],
                    description: "Volunteered with Swapna Foundation to lead deployment and management of infrastructure solutions, enhancing the overall fan experience through innovative development and engagement strategies."
                },
                {
                    company: "Dainik Jagran",
                    role: "Email Campaign Manager",
                    date: "Nov 2024 – Dec 2024",
                    type: "Freelance · Hybrid",
                    skills: ["SEO", "Email Distribution"],
                    description: "Managed SMTP setup for brand invitation and collaboration. Successfully executed campaigns for 40+ brands and 20+ Professors and Directorates of IITs."
                },
                {
                    company: "Felicita Films",
                    role: "Senior Web Developer",
                    date: "Mar 2023 – Dec 2023",
                    type: "Internship · Remote",
                    skills: ["Python", "E-Commerce"],
                    description: "Managed and overlooked the development team, led deployment and scaling of production systems. Enhanced app performance by 25% through component optimization and lazy loading."
                },
                {
                    company: "aosp-devs",
                    role: "Android Engineer",
                    date: "Apr 2018 – Jan 2023",
                    type: "Freelance · Lucknow",
                    skills: ["Android Framework", "Linux Kernel"],
                    description: "Android ROM builder. Contributed to OSS Kernel Development team for OnePlus 9RT, Redmi Note 7, and Redmi Note 11. Deep expertise in Linux kernel and Android framework internals."
                }
            ];

            const projects = [
                {
                    title: "Vaayu Darshak",
                    tags: ["Flutter", "Dart", "LSTM+ARIMA", "Node.js", "ISRO"],
                    description: "Hyperlocal air quality app visualizing real-time data using ISRO EOS-6 satellite imagery. Hybrid LSTM+ARIMA+CNN model forecasting pollution 72h ahead. Built for ISRO's BAH2025 Hackathon.",
                    color: "bg-[#EBFF00]",
                    image: "https://picsum.photos/seed/vaayu/800/450",
                    github: "https://github.com/iamharshit188/isro_hackathon-bah2025",
                    badge: "ISRO HACKATHON"
                },
                {
                    title: "PsiFur AI",
                    tags: ["Python", "Manim", "LLMs", "Agentic AI"],
                    description: "Agentic AI pipeline converting natural language queries into simulated physics videos. Automates code generation for the Manim engine. Winner at IIT Patna Celesta Hackathon.",
                    color: "bg-[#FF00FF]",
                    image: "https://picsum.photos/seed/psifur/800/450",
                    github: "https://github.com/iamharshit188/Celesta_Hackathon",
                    badge: "IIT PATNA WINNER"
                },
                {
                    title: "Siya Model",
                    tags: ["PyTorch", "BERT", "LSTM", "NLP"],
                    description: "Claim detection model identifying factual claims in social media with 85% accuracy. Trained on 50,000+ posts using transfer learning. Finalist at IIT Kanpur NFRA Hackathon.",
                    color: "bg-[#00FFFF]",
                    image: "https://picsum.photos/seed/siya/800/450",
                    github: "https://github.com/Water-Plane/WaterPlane_PRAMAAN",
                    badge: "IIT KANPUR FINALIST"
                }
            ];

            const achievements = [
                { title: "Winner - Celesta Hackathon", org: "IIT Patna", desc: "1st Place among 50+ teams. Built innovative AI-driven tech solution." },
                { title: "Winner - Samsung Hackathon", org: "BBD University", desc: "Created AI-driven web app for agricultural advancement." },
                { title: "Finalist - NFRA Finance Hackathon", org: "IIT Kanpur", desc: "GenAI solution for simplifying financial statements." },
                { title: "Finalist - Vault Heist", org: "CGC Mohali", desc: "Top finalist among 300+ teams in cybersecurity hackathon." }
            ];

            const NeoButton = ({ children, onClick, className = "", variant = "primary", as: Tag = "button", href, target, rel }) => {
                const baseStyle = "border-[3px] border-black dark:border-white font-bold px-6 py-3 transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none font-mono uppercase tracking-wider text-sm sm:text-base cursor-pointer";
                const variants = {
                    primary: "bg-[#EBFF00] text-black hover:bg-[#d4e600] shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]",
                    secondary: "bg-white text-black dark:bg-[#2a2a2a] dark:text-white hover:bg-gray-50 dark:hover:bg-[#333] shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]",
                    dark: "bg-black text-white dark:bg-white dark:text-black hover:bg-gray-900 dark:hover:bg-gray-200 shadow-[4px_4px_0px_0px_#EBFF00] dark:shadow-[4px_4px_0px_0px_#FF00FF]"
                };
                if (Tag === 'a') {
                    return <a href={href} target={target} rel={rel} className={`inline-flex items-center ${baseStyle} ${variants[variant]} ${className}`}>{children}</a>;
                }
                return <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
            };

            return (
                <div className="min-h-screen font-sans overflow-x-hidden transition-colors duration-300">

                    {/* Explore More Modal */}
                    {showExplore && <ExploreModal onClose={() => setShowExplore(false)} isDark={isDark} />}

                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 bg-white dark:bg-[#0a0a0a] border-b-[3px] border-black dark:border-white px-4 py-3 md:px-8 transition-colors duration-300">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="text-xl md:text-2xl font-display uppercase tracking-tighter">
                                HT<span className="text-[#FF00FF]">.</span>DEV
                            </div>
